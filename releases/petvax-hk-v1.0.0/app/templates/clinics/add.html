{% extends "base.html" %}

{% block title %}Add Clinic - PetVaxHK{% endblock %}

{% block content %}
<h1>Add Veterinary Clinic</h1>

<form method="POST">
    <div class="form-group">
        <label for="name">Clinic Name *</label>
        <input type="text" id="name" name="name" required>
    </div>
    
    <div class="form-group">
        <label for="address">Address</label>
        <textarea id="address" name="address" rows="2"></textarea>
    </div>
    
    <div class="form-group">
        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone">
    </div>
    
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email">
    </div>
    
    <div class="form-group">
        <label for="district">District</label>
        <input type="text" id="district" name="district" placeholder="e.g., Central & Western">
    </div>
    
    <button type="submit" class="btn btn-primary">Add Clinic</button>
    <a href="{{ url_for('main.clinics_list') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
