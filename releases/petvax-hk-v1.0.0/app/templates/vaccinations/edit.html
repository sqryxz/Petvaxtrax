{% extends "base.html" %}

{% block title %}Edit Vaccination - PetVaxHK{% endblock %}

{% block content %}
<h1>Edit Vaccination Record</h1>

<form method="POST">
    <div class="form-group">
        <label for="pet_id">Pet *</label>
        <select id="pet_id" name="pet_id" required>
            <option value="">Select pet</option>
            {% for pet in pets %}
            <option value="{{ pet.id }}" {% if vaccination.pet_id == pet.id %}selected{% endif %}>{{ pet.name }} ({{ pet.species }})</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group">
        <label for="vaccine_id">Vaccine *</label>
        <select id="vaccine_id" name="vaccine_id" required>
            <option value="">Select vaccine</option>
            {% for vaccine in vaccines %}
            <option value="{{ vaccine.id }}" {% if vaccination.vaccine_id == vaccine.id %}selected{% endif %}>{{ vaccine.name }} ({{ vaccine.code }})</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group">
        <label for="date_administered">Date Administered *</label>
        <input type="date" id="date_administered" name="date_administered" value="{{ vaccination.date_administered }}" required>
    </div>
    
    <div class="form-group">
        <label for="due_date">Due Date (next vaccination)</label>
        <input type="date" id="due_date" name="due_date" value="{{ vaccination.due_date or '' }}">
    </div>
    
    <div class="form-group">
        <label for="vet_clinic_id">Veterinary Clinic</label>
        <select id="vet_clinic_id" name="vet_clinic_id">
            <option value="">Select clinic</option>
            {% for clinic in clinics %}
            <option value="{{ clinic.id }}" {% if vaccination.vet_clinic_id == clinic.id %}selected{% endif %}>{{ clinic.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group">
        <label for="batch_number">Batch Number</label>
        <input type="text" id="batch_number" name="batch_number" value="{{ vaccination.batch_number or '' }}">
    </div>
    
    <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="3">{{ vaccination.notes or '' }}</textarea>
    </div>
    
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{{ url_for('main.pets_detail', pet_id=vaccination.pet_id) }}" class="btn btn-secondary">Cancel</a>
</form>

<div class="delete-section">
    <h3>Delete Vaccination Record</h3>
    <p>Warning: This will permanently delete this vaccination record.</p>
    <form method="POST" action="{{ url_for('main.vaccinations_delete', vaccination_id=vaccination.id) }}" onsubmit="return confirm('Are you sure you want to delete this vaccination record?');">
        <button type="submit" class="btn btn-danger">Delete Record</button>
    </form>
</div>
{% endblock %}
