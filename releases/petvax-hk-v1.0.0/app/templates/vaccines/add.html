{% extends "base.html" %}

{% block title %}Add Vaccine - PetVaxHK{% endblock %}

{% block content %}
<h1>Add Vaccine Type</h1>

<form method="POST">
    <div class="form-group">
        <label for="name">Vaccine Name *</label>
        <input type="text" id="name" name="name" required placeholder="e.g., Canine Distemper">
    </div>
    
    <div class="form-group">
        <label for="code">Code *</label>
        <input type="text" id="code" name="code" required placeholder="e.g., DHPP, Rabies">
    </div>
    
    <div class="form-group">
        <label for="species">Species *</label>
        <select id="species" name="species" required>
            <option value="">Select species</option>
            <option value="dog">Dog</option>
            <option value="cat">Cat</option>
            <option value="both">Both</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="3"></textarea>
    </div>
    
    <div class="form-group">
        <label for="valid_months">Validity Period (months)</label>
        <input type="number" id="valid_months" name="valid_months" min="1">
    </div>
    
    <button type="submit" class="btn btn-primary">Add Vaccine</button>
    <a href="{{ url_for('main.vaccines_list') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
