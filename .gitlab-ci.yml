# GitLab CI/CD Configuration for PetVaxHK
# Place in .gitlab-ci.yml at project root

stages:
  - test
  - lint
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - .venv/

test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -e ".[dev]" pytest pytest-cov
  script:
    - pytest app/tests/ -v --cov=app --cov-report=xml --cov-report=term
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

lint:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install ruff black
  script:
    - ruff check app/
    - black --check app/

build:
  stage: build
  image: python:3.11-slim
  before_script:
    - pip install -e .
  script:
    - python -c "from app import create_app; app = create_app()"
    - python -c "from app.cli import main; print('CLI module loads OK')"
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
